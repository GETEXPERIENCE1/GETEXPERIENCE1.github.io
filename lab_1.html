<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Работа с текстом</title>
</head>
<body>

    <h1>Заголовок первого уровня</h1>
    
    <p>
        Это пример обычного абзаца текста.
    </p>

    <h2>Заголовок второго уровня</h2>
    
    <p>
        Здесь можно использовать <b>жирное начертание</b> (тег b или strong) 
        и <i>курсив</i> (тег i или em).
    </p>

    <hr>
    
    <p>
        Нижняя часть документа отделена горизонтальной линией (тег hr).
    </p>

</body>
</html>
